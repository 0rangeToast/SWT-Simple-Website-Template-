<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://kasanete.to/img/favicon.png" />
    <title>Teto.Fun</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111; 
            font-family: 'Nunito', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px; 
        }

        .main-logo {
            max-width: 340px;
            height: auto;
            display: inline-block;
        }

        .games-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; 
            flex-wrap: wrap; 
        }

        .game-card {
            display: block; 
            text-decoration: none;
            
            width: 320px; 
            height: 150px; 
            
            border: 5px solid #353535;
            border-radius: 16px; 
            overflow: hidden; 
            
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: none; 
        }

        .game-card:hover {
            transform: translateY(-4px); 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.06); 
        }

        .game-card img {
            width: 100%;      
            height: 100%;     
            object-fit: fill; 
            display: block;   
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="./logo.png" alt="teto.Fun Logo" class="main-logo">
        </header>

        <main class="games-row">
            
            <a href="./hol/songs.html" class="game-card">
                <img src="./HIGH.png" alt="Higher or Lower card">
            </a>

            <a href="./memory/tetosmemory.html" class="game-card">
                <img src="./HIGH.png" alt="Game 2 Thumbnail">
            </a>

            <a href="./cookie/clicker.html" class="game-card">
                <img src="./HIGH.png" alt="pearto clicker">
            </a>

        </main>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<noscript>JavaScript is required for this website.</noscript>
<title>Teto.fun</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://kasanete.to/img/favicon.png" />
    <meta name="description" content="A page containing Teto/Vocaloid games">
    <meta property="og:title" content="Teto.fun" />
    <meta property="og:description" content="A page containing Teto/Vocaloid games" />
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://tetodomination.com/games/HIGH.png" /> 
    <meta property="og:url" content="https://tetodomination.com/games" />
    <meta content="#D6475E" name="theme-color" /> 

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111111; 
            font-family: 'Nunito', sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px; 
        }

        .main-logo {
            max-width: 340px;
            height: auto;
            display: inline-block;
        }

        .games-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px; 
            flex-wrap: wrap; 
        }

        .game-card {
            display: block; 
            text-decoration: none;
            
            width: 320px; 
            height: 150px; 
            
            border: 5px solid #353535;
            border-radius: 16px; 
            overflow: hidden; 
            
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: none; 
        }

        .game-card:hover {
            transform: translateY(-4px); 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.06); 
        }

        .game-card img {
            width: 100%;      
            height: 100%;     
            object-fit: fill; 
            display: block;   
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="./logo.png" alt="teto.Fun Logo" class="main-logo">
        </header>

        <main class="games-row">
            
            <a href="./high-or-low/index.html" class="game-card">
                <img src="https://tetodomination.com/games/HIGH.png" alt="Higher or Lower card">
            </a>

            <a href="./tetos-from-memory/index.html" class="game-card">
                <img src="https://tetodomination.com/games/HIGH.png" alt="Draw from memory">
            </a>

            <a href="./cookie/clicker.html" class="game-card">
                <img src="https://tetodomination.com/games/HIGH.png" alt="pearto clicker">
            </a>

        </main>
    </div>

</body>
</html>
